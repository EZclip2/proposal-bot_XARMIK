<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Переписка</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root{
    --bg:       var(--tg-theme-bg-color, #0e1621);
    --panel:    var(--tg-theme-secondary-bg-color, #17212b);
    --text:     var(--tg-theme-text-color, #ffffff);
    --hint:     var(--tg-theme-hint-color, #8596a5);
    --link:     var(--tg-theme-link-color, #62a0e0);
    --accent:   var(--tg-theme-button-color, #4d8fd6);
    --accent-t: var(--tg-theme-button-text-color, #ffffff);
    --their:    #202b38;
    --danger:   #e15b56;
    --ok:       #4bb34b;
    --warn:     #e0a13a;
    --stroke:   rgba(255,255,255,.07);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
  html,body{height:100%}
  body{
    display:flex;flex-direction:column;height:100vh;overflow:hidden;
    background:var(--bg);color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    font-size:15px;line-height:1.4;
  }

  /* ---------- Header ---------- */
  header{
    flex:0 0 auto;padding:calc(env(safe-area-inset-top) + 11px) 13px 11px;
    background:linear-gradient(180deg, color-mix(in srgb, var(--panel) 92%, #fff 8%), var(--panel));
    display:flex;align-items:center;gap:11px;
    border-bottom:1px solid var(--stroke);
    box-shadow:0 2px 14px rgba(0,0,0,.30);z-index:5;
  }
  .h-ava{
    flex:0 0 auto;width:43px;height:43px;border-radius:50%;display:grid;place-items:center;
    font-weight:700;font-size:16px;color:#fff;background:linear-gradient(135deg,#5a9be6,#3f7bc4);
    box-shadow:0 3px 10px rgba(63,123,196,.35);
  }
  .h-ava.mod{background:linear-gradient(135deg,#e6b455,#d1852a);box-shadow:0 3px 10px rgba(209,133,42,.35)}
  .h-info{flex:1;min-width:0}
  .h-title{font-weight:600;font-size:16px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .h-sub{display:flex;align-items:center;gap:6px;color:var(--hint);font-size:12.5px;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .chip{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:500;padding:2.5px 9px;border-radius:20px;background:rgba(255,255,255,.08);white-space:nowrap}
  .dot{width:7px;height:7px;border-radius:50%;flex:0 0 auto}
  .dot.new{background:var(--warn)}
  .dot.processing{background:var(--accent);animation:pulse 1.4s infinite}
  .dot.answered{background:var(--link)}
  .dot.closed{background:var(--ok)}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(77,143,214,.6)}70%{box-shadow:0 0 0 7px rgba(77,143,214,0)}100%{box-shadow:0 0 0 0 rgba(77,143,214,0)}}
  .h-act{flex:0 0 auto;display:flex;gap:7px}
  .icon-btn{
    width:39px;height:39px;border-radius:50%;border:none;cursor:pointer;
    background:rgba(255,255,255,.08);color:var(--text);font-size:17px;display:grid;place-items:center;
    transition:background .15s,transform .1s,opacity .15s;
  }
  .icon-btn:active{transform:scale(.88)}
  .icon-btn.ok{color:var(--ok);background:rgba(75,179,75,.14)}
  .icon-btn.danger{color:var(--danger);background:rgba(225,91,86,.14)}
  .icon-btn.dim{opacity:.4}

  /* ---------- Feed ---------- */
  #feed{
    flex:1 1 auto;overflow-y:auto;overflow-x:hidden;padding:14px 12px 8px;
    display:flex;flex-direction:column;gap:3px;scroll-behavior:smooth;
    background:
      radial-gradient(circle at 15% 8%, rgba(98,160,224,.05), transparent 45%),
      radial-gradient(circle at 85% 95%, rgba(224,161,58,.04), transparent 45%);
  }
  #feed::-webkit-scrollbar{width:0}
  .row{display:flex;align-items:flex-end;gap:8px;margin-top:9px;animation:pop .24s cubic-bezier(.2,.7,.3,1) both}
  .row.me{flex-direction:row-reverse}
  @keyframes pop{from{opacity:0;transform:translateY(9px) scale(.98)}to{opacity:1;transform:none}}
  .row .ava{
    flex:0 0 auto;width:29px;height:29px;border-radius:50%;display:grid;place-items:center;
    font-size:12px;font-weight:600;color:#fff;background:linear-gradient(135deg,#5a9be6,#3f7bc4);align-self:flex-end;
    box-shadow:0 2px 6px rgba(0,0,0,.25);
  }
  .row.me .ava{visibility:hidden;width:0;margin:0}
  .row.modmsg .ava{background:linear-gradient(135deg,#e6b455,#d1852a)}
  .bubble{
    position:relative;max-width:calc(100% - 50px);padding:9px 13px 7px;border-radius:18px;
    word-break:break-word;overflow-wrap:anywhere;white-space:pre-wrap;box-shadow:0 2px 6px rgba(0,0,0,.18);
  }
  .me .bubble{background:linear-gradient(135deg,var(--accent),#3f7bc4);color:var(--accent-t);border-bottom-right-radius:6px}
  .them .bubble{background:var(--their);border:1px solid var(--stroke);border-bottom-left-radius:6px}
  .bubble .who{font-size:12px;font-weight:600;color:var(--link);margin-bottom:2px}
  .me .bubble .who{color:rgba(255,255,255,.9)}
  .bubble .time{font-size:10.5px;opacity:.65;float:right;margin:5px 0 -2px 12px;user-select:none}
  .row.ctx{opacity:.5}
  .row.ctx .bubble{font-style:italic}

  .date-sep{align-self:center;margin:14px 0 5px;font-size:11.5px;font-weight:500;color:var(--hint);
    background:rgba(0,0,0,.28);padding:3.5px 13px;border-radius:20px;backdrop-filter:blur(6px)}
  .sys{align-self:center;margin:9px 4px;font-size:12px;color:var(--hint);text-align:center;max-width:90%}
  .sys.ctx-div{display:flex;align-items:center;gap:10px;width:90%;color:var(--hint)}
  .sys.ctx-div::before,.sys.ctx-div::after{content:"";flex:1;height:1px;background:var(--stroke)}
  .sys.done{display:inline-flex;align-items:center;gap:6px;color:var(--ok);background:rgba(75,179,75,.1);padding:5px 14px;border-radius:20px}

  .center-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:var(--hint);padding:30px;text-align:center}
  .center-wrap .emo{font-size:54px;filter:drop-shadow(0 4px 12px rgba(0,0,0,.35))}
  .center-wrap b{color:var(--text);font-size:16px}
  .skel{width:100%;max-width:520px;display:flex;flex-direction:column;gap:14px;padding:20px}
  .skel .sk{height:36px;border-radius:16px;background:linear-gradient(90deg,rgba(255,255,255,.05),rgba(255,255,255,.11),rgba(255,255,255,.05));background-size:200% 100%;animation:shimmer 1.3s infinite}
  .skel .sk.r{align-self:flex-end;width:60%}
  .skel .sk.l{align-self:flex-start;width:72%}
  @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

  .banner{flex:0 0 auto;padding:10px 14px;text-align:center;font-size:13px;font-weight:500;border-top:1px solid var(--stroke)}
  .banner.warn{background:rgba(224,161,58,.15);color:var(--warn)}
  .banner.ok{background:rgba(75,179,75,.15);color:var(--ok)}
  .banner.info{background:rgba(98,160,224,.13);color:var(--link)}

  footer{
    flex:0 0 auto;padding:9px 10px calc(env(safe-area-inset-bottom) + 9px);
    background:var(--panel);display:flex;gap:9px;align-items:flex-end;
    border-top:1px solid var(--stroke);box-shadow:0 -2px 14px rgba(0,0,0,.28);
  }
  .input-wrap{flex:1;background:var(--bg);border-radius:23px;display:flex;align-items:flex-end;padding:2px 4px;border:1px solid transparent;transition:border-color .15s}
  .input-wrap:focus-within{border-color:color-mix(in srgb, var(--accent) 55%, transparent)}
  textarea{
    flex:1;resize:none;max-height:130px;min-height:42px;padding:10px 12px;border:none;outline:none;
    background:transparent;color:var(--text);font:inherit;line-height:1.35;
  }
  textarea::placeholder{color:var(--hint)}
  .send-btn{
    flex:0 0 auto;width:46px;height:46px;border-radius:50%;border:none;cursor:pointer;
    background:linear-gradient(135deg,var(--accent),#3f7bc4);color:var(--accent-t);font-size:19px;
    display:grid;place-items:center;box-shadow:0 3px 10px rgba(63,123,196,.4);
    transition:transform .12s,opacity .15s,box-shadow .15s;
  }
  .send-btn:disabled{opacity:.4;cursor:default;box-shadow:none}
  .send-btn:not(:disabled):active{transform:scale(.86)}
  .toast{
    position:fixed;left:50%;bottom:calc(env(safe-area-inset-bottom) + 82px);transform:translateX(-50%) translateY(12px);
    background:rgba(0,0,0,.86);color:#fff;padding:10px 17px;border-radius:22px;font-size:13px;
    opacity:0;pointer-events:none;transition:opacity .25s,transform .25s;z-index:30;max-width:88%;text-align:center;box-shadow:0 6px 22px rgba(0,0,0,.45)}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .hidden{display:none!important}
</style>
</head>
<body>
  <header id="header" class="hidden">
    <div class="h-ava" id="hAva">💬</div>
    <div class="h-info">
      <div class="h-title" id="hTitle">Переписка</div>
      <div class="h-sub">
        <span class="chip"><span class="dot" id="hDot"></span><span id="hState"></span></span>
        <span id="hMeta"></span>
      </div>
    </div>
    <div class="h-act">
      <button class="icon-btn ok hidden" id="btnClose" title="Завершить">✅</button>
      <button class="icon-btn danger hidden" id="btnReject" title="Отклонить">🚫</button>
    </div>
  </header>

  <div id="feed"></div>

  <div id="banner" class="banner hidden"></div>

  <footer id="composer" class="hidden">
    <div class="input-wrap">
      <textarea id="input" rows="1" placeholder="Сообщение…"></textarea>
    </div>
    <button class="send-btn" id="send" disabled>➤</button>
  </footer>

  <div id="toast" class="toast"></div>

<script>
const tg = window.Telegram && window.Telegram.WebApp;
if (tg) {
  tg.ready(); tg.expand();
  try {
    tg.setHeaderColor && tg.setHeaderColor('secondary_bg_color');
    tg.setBackgroundColor && tg.setBackgroundColor('bg_color');
  } catch (e) {}
}

let sid = (tg && tg.initDataUnsafe && tg.initDataUnsafe.start_param) || '';
const initData = (tg && tg.initData) || '';
let role = null, lastView = null, renderedKey = '', pollTimer = null, sending = false;

const $ = (id) => document.getElementById(id);
const feed = $('feed'), input = $('input'), sendBtn = $('send');

function api(path, body){
  return fetch(path, {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ initData, ...body })
  }).then(async r => {
    const data = await r.json().catch(()=>({}));
    if (!r.ok) throw new Error(data.error || ('Ошибка ' + r.status));
    return data;
  });
}

function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function initials(name){
  const s = (name||'').replace(/^@/,'').trim();
  return s ? s.slice(0,2).toUpperCase() : '👤';
}
function fmtTime(ms){
  const d = new Date(ms||Date.now());
  return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');
}
function fmtDay(ms){
  const d = new Date(ms||Date.now()), now = new Date();
  const sameDay=(a,b)=>a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate();
  const y=new Date(now); y.setDate(now.getDate()-1);
  if (sameDay(d,now)) return 'Сегодня';
  if (sameDay(d,y))   return 'Вчера';
  return d.toLocaleDateString('ru-RU',{day:'numeric',month:'long'});
}
function stateMeta(st){
  if (st==='new')        return {label:'новое', cls:'new'};
  if (st==='processing') return {label:'в работе', cls:'processing'};
  if (st==='answered')   return {label:'отвечено', cls:'answered'};
  if (st==='closed')     return {label:'обработано', cls:'closed'};
  return {label:st||'', cls:''};
}

function screen(kind, opts){
  opts = opts || {};
  clearInterval(pollTimer);
  $('composer').classList.add('hidden');
  $('banner').classList.add('hidden');
  $('header').classList.add('hidden');
  if (kind==='loading'){
    feed.innerHTML = '<div class="skel"><div class="sk l"></div><div class="sk r"></div><div class="sk l"></div><div class="sk r"></div></div>';
  } else if (kind==='error'){
    feed.innerHTML = '<div class="center-wrap"><div class="emo">😕</div><b>Не удалось открыть</b><div>'+esc(opts.msg||'')+'</div></div>';
  }
}

function atBottom(){ return feed.scrollHeight - feed.scrollTop - feed.clientHeight < 80; }

let toastTimer=null;
function toast(msg){
  const t=$('toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove('show'),2800);
}

function setBanner(kind, text){
  const b=$('banner');
  if(!kind){ b.classList.add('hidden'); return; }
  b.className='banner '+kind; b.textContent=text;
}

function render(view){
  lastView = view;
  role = view.role;
  const meta = stateMeta(view.state);
  const isMod = role==='mod';

  // header
  $('header').classList.remove('hidden');
  $('hTitle').textContent = isMod ? (view.userMention || 'Подписчик') : 'Администрация';
  $('hAva').textContent = isMod ? initials(view.userMention) : '🛡';
  $('hAva').className = 'h-ava' + (isMod ? '' : ' mod');
  $('hState').textContent = meta.label;
  $('hDot').className = 'dot ' + meta.cls;
  $('hMeta').textContent = '· 🆔 ' + view.id + (view.parentId ? ' · 🔁 '+view.parentId : '');

  // действия в шапке
  const showClose  = view.closable && !view.locked;
  const showReject = isMod && !view.locked && !view.closed;
  $('btnClose').classList.toggle('hidden', !showClose);
  $('btnClose').classList.toggle('dim', !view.closeEnabled);
  $('btnClose').title = isMod ? 'Обработать' : 'Завершить';
  $('btnReject').classList.toggle('hidden', !showReject);

  // право писать: подписчик — всегда (в closed создаст новое); модератор — если не занято и не закрыто
  const canWrite = (role==='user') || (isMod && !view.locked && !view.closed);
  $('composer').classList.toggle('hidden', !canWrite);
  input.disabled = !canWrite;
  input.placeholder = isMod
    ? 'Ваш ответ…'
    : (view.closed ? 'Новое сообщение создаст новое обращение…'
       : (view.state==='answered' ? 'Дополнить обращение…' : 'Сообщение…'));
  syncSendBtn();

  // баннеры
  if (view.locked)                setBanner('warn','🔒 Обращение уже обрабатывает другой модератор');
  else if (view.closed && isMod)  setBanner('ok','✅ Обращение обработано');
  else if (view.closed && !isMod) setBanner('info','✅ Обработано. Новое сообщение создаст новое обращение с этим контекстом.');
  else if (isMod && view.closable && !view.closeEnabled) setBanner('info','⏳ '+(view.closeHint||'Пока нельзя обработать'));
  else                            setBanner(null);

  // лента — перерисовываем только при изменениях
  const key = view.id+'|'+view.state+'|'+view.messages.length+'|'+(view.messages.slice(-1)[0]?.time||0)+'|'+view.locked;
  if (key === renderedKey) return;
  const stick = atBottom() || renderedKey==='';
  renderedKey = key;

  feed.innerHTML = '';
  const msgs = view.messages || [];
  if (!msgs.length){
    feed.innerHTML = '<div class="center-wrap"><div class="emo">✍️</div><b>'
      + (isMod ? 'Обращение без текста' : 'Начните переписку')
      + '</b><div>'+(isMod?'Напишите первый ответ подписчику.':'Опишите вопрос — модерация ответит здесь.')+'</div></div>';
    return;
  }

  let lastDay='', ctxShown=false;
  msgs.forEach(m=>{
    if (m.ctx && !ctxShown){
      ctxShown=true;
      const s=document.createElement('div'); s.className='sys ctx-div';
      s.textContent='контекст прошлого обращения'; feed.appendChild(s);
    }
    const day=fmtDay(m.time);
    if (day!==lastDay){ lastDay=day; const ds=document.createElement('div'); ds.className='date-sep'; ds.textContent=day; feed.appendChild(ds); }

    const mine=(isMod&&m.from==='mod')||(role==='user'&&m.from==='user');
    const row=document.createElement('div');
    row.className='row '+(mine?'me':'them')+(m.from==='mod'?' modmsg':'')+(m.ctx?' ctx':'');

    const ava=document.createElement('div'); ava.className='ava';
    ava.textContent = m.from==='mod' ? '🛡' : initials(m.by||view.userMention);
    row.appendChild(ava);

    const b=document.createElement('div'); b.className='bubble';
    const showWho=!mine;
    const who = m.from==='mod' ? 'Администрация' : (isMod ? (m.by||'Подписчик') : 'Вы');
    b.innerHTML=(showWho?'<div class="who">'+esc(who)+'</div>':'')+esc(m.text)+'<span class="time">'+fmtTime(m.time)+'</span>';
    row.appendChild(b);
    feed.appendChild(row);
  });

  if (view.closed){
    const s=document.createElement('div'); s.className='sys done';
    s.textContent='✅ Обращение обработано'; feed.appendChild(s);
  }

  if (stick) feed.scrollTop = feed.scrollHeight;
}

function syncSendBtn(){ sendBtn.disabled = sending || input.disabled || !input.value.trim(); }

async function refresh(){
  if (!sid) return;
  try { render(await api('/api/open', { sid })); } catch(e){}
}

async function boot(){
  screen('loading');
  if (!sid){ screen('error', {msg:'Не передан идентификатор обращения.'}); return; }
  try { render(await api('/api/open', { sid })); }
  catch(e){ screen('error', {msg:e.message}); return; }
  clearInterval(pollTimer);
  pollTimer = setInterval(refresh, 3500);
}

async function doSend(){
  const text = input.value.trim();
  if (!text || sending) return;
  sending = true; syncSendBtn();
  try {
    const view = await api('/api/send', { sid, text });
    input.value=''; autoGrow();
    if (view.switchTo && view.switchTo !== sid){
      sid = view.switchTo;
      toast('Отправлено как новое обращение — с контекстом переписки');
    }
    renderedKey=''; render(view);
    feed.scrollTop = feed.scrollHeight;
    if (tg && tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
  } catch(e){
    if (tg && tg.showAlert) tg.showAlert(e.message); else alert(e.message);
  } finally {
    sending=false; syncSendBtn(); input.focus();
  }
}

function autoGrow(){ input.style.height='42px'; input.style.height=Math.min(input.scrollHeight,130)+'px'; }

sendBtn.addEventListener('click', doSend);
input.addEventListener('input', ()=>{ autoGrow(); syncSendBtn(); });
input.addEventListener('keydown', (e)=>{ if (e.key==='Enter' && !e.shiftKey){ e.preventDefault(); doSend(); } });

$('btnClose').addEventListener('click', ()=>{
  const v = lastView; if (!v) return;
  if (!v.closeEnabled){
    const hint = v.closeHint || 'Пока нельзя обработать.';
    if (tg && tg.showAlert) tg.showAlert(hint); else alert(hint);
    return;
  }
  const q = (role==='mod') ? 'Обработать обращение? Оно уйдёт в «Обработанные».'
                           : 'Завершить обращение? Диалог будет закрыт.';
  const ask=(cb)=> (tg&&tg.showConfirm)?tg.showConfirm(q,cb):cb(confirm(q));
  ask(async (ok)=>{
    if(!ok) return;
    try{
      const view = await api('/api/close', { sid });
      renderedKey=''; render(view);
      if (tg && tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
      toast(role==='mod' ? 'Обработано ✅' : 'Обращение завершено ✅');
    }catch(e){ if(tg&&tg.showAlert)tg.showAlert(e.message); else alert(e.message); }
  });
});

$('btnReject').addEventListener('click', ()=>{
  const q='Отклонить обращение? Действие необратимо.';
  const ask=(cb)=> (tg&&tg.showConfirm)?tg.showConfirm(q,cb):cb(confirm(q));
  ask(async (ok)=>{
    if(!ok) return;
    try{
      await api('/api/reject', { sid });
      clearInterval(pollTimer);
      if (tg && tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('warning');
      if (tg && tg.close) tg.close();
      else { screen('error',{msg:'Обращение отклонено.'}); feed.innerHTML='<div class="center-wrap"><div class="emo">🚫</div><b>Отклонено</b></div>'; }
    }catch(e){ if(tg&&tg.showAlert)tg.showAlert(e.message); else alert(e.message); }
  });
});

boot();
</script>
</body>
</html>

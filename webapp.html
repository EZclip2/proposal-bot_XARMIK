<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Переписка</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root{
    --bg: var(--tg-theme-bg-color, #17212b);
    --card: var(--tg-theme-secondary-bg-color, #232e3c);
    --text: var(--tg-theme-text-color, #fff);
    --hint: var(--tg-theme-hint-color, #7d8b99);
    --btn: var(--tg-theme-button-color, #5288c1);
    --btn-text: var(--tg-theme-button-text-color, #fff);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;margin:0}
  body{
    display:flex;flex-direction:column;background:var(--bg);color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;font-size:15px;
  }
  header{
    padding:10px 14px;background:var(--card);flex:0 0 auto;
    box-shadow:0 1px 0 rgba(0,0,0,.2);
  }
  header .title{font-weight:600;display:flex;align-items:center;gap:8px}
  header .sub{color:var(--hint);font-size:12px;margin-top:3px;word-break:break-word}
  #status{font-size:12px}
  #feed{flex:1 1 auto;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px}
  .msg{max-width:82%;padding:8px 11px;border-radius:14px;line-height:1.35;white-space:pre-wrap;word-break:break-word}
  .msg .who{font-size:11px;color:var(--hint);margin-bottom:2px}
  .mine{align-self:flex-end;background:var(--btn);color:var(--btn-text);border-bottom-right-radius:4px}
  .mine .who{color:rgba(255,255,255,.75)}
  .their{align-self:flex-start;background:var(--card);border-bottom-left-radius:4px}
  .ctx{opacity:.6;font-style:italic}
  .sysline{align-self:center;color:var(--hint);font-size:12px;text-align:center;padding:2px 8px}
  footer{flex:0 0 auto;padding:8px;background:var(--card);display:flex;gap:8px;align-items:flex-end}
  textarea{
    flex:1;resize:none;max-height:120px;min-height:40px;padding:10px 12px;border-radius:18px;
    border:none;outline:none;background:var(--bg);color:var(--text);font:inherit;
  }
  button{
    border:none;border-radius:18px;padding:0 16px;height:40px;background:var(--btn);color:var(--btn-text);
    font-weight:600;cursor:pointer;flex:0 0 auto
  }
  button:disabled{opacity:.5}
  #reject{background:#c1524f}
  #modbar{padding:6px 12px;background:var(--card);display:none;justify-content:flex-end}
  #err{padding:20px;text-align:center;color:var(--hint)}
  .hidden{display:none!important}
</style>
</head>
<body>
  <header>
    <div class="title"><span id="hIcon">💬</span><span id="hTitle">Переписка</span></div>
    <div class="sub"><span id="hMeta"></span> · <span id="status"></span></div>
  </header>

  <div id="modbar"><button id="reject">🚫 Отклонить</button></div>
  <div id="feed"></div>
  <div id="err" class="hidden"></div>

  <footer id="composer">
    <textarea id="input" placeholder="Напишите сообщение…" rows="1"></textarea>
    <button id="send">➤</button>
  </footer>

<script>
const tg = window.Telegram && window.Telegram.WebApp;
if (tg) { tg.ready(); tg.expand(); }

let sid = (tg && tg.initDataUnsafe && tg.initDataUnsafe.start_param) || '';
const initData = (tg && tg.initData) || '';
let role = null, state = null;
let renderedKey = '';        // чтобы не перерисовывать одно и то же при поллинге
let pollTimer = null;

const $ = (id) => document.getElementById(id);
const feed = $('feed'), input = $('input'), sendBtn = $('send');

function api(path, body){
  return fetch(path, {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ initData, ...body })
  }).then(async r => {
    const data = await r.json().catch(()=>({}));
    if (!r.ok) throw new Error(data.error || ('Ошибка '+r.status));
    return data;
  });
}

function fatal(msg){
  clearInterval(pollTimer);
  $('composer').classList.add('hidden');
  $('modbar').style.display='none';
  feed.classList.add('hidden');
  const e = $('err'); e.classList.remove('hidden'); e.textContent = '⚠️ ' + msg;
}

function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function stateLabel(st){
  if (st==='new') return '🟡 новое';
  if (st==='processing') return '🟠 в работе';
  if (st==='answered') return '🟢 отвечено';
  return st||'';
}

function render(view){
  role = view.role; state = view.state;
  const key = view.id + '|' + view.state + '|' + view.messages.length +
              '|' + (view.messages.slice(-1)[0]?.time || 0);

  $('hMeta').textContent = '🆔 ' + view.id +
      (role==='mod' ? ('  ·  ' + (view.userMention||'')) : '') +
      (view.parentId ? ('  ·  🔁 '+view.parentId) : '');
  $('status').textContent = stateLabel(view.state) + (view.locked ? '  ·  🔒 ведёт другой' : '');
  $('hTitle').textContent = role==='mod' ? 'Ответ на обращение' : 'Ваше обращение';

  // панель отклонения — только модератору и пока не заблокировано
  $('modbar').style.display = (role==='mod' && !view.locked) ? 'flex' : 'none';

  // поле ввода: модератор блокируется, если ведёт другой; подписчик пишет всегда
  const canWrite = role==='user' || (role==='mod' && !view.locked);
  input.disabled = !canWrite; sendBtn.disabled = !canWrite;
  input.placeholder = !canWrite ? 'Обращение ведёт другой модератор'
    : (role==='mod' ? (view.state==='answered' ? 'Дополнить ответ…' : 'Написать ответ…') : 'Написать сообщение…');

  if (key === renderedKey) return;
  renderedKey = key;

  feed.innerHTML = '';
  const msgs = view.messages || [];
  if (!msgs.length){
    const d=document.createElement('div'); d.className='sysline';
    d.textContent='Пока сообщений нет — начните переписку.'; feed.appendChild(d);
  }
  let ctxShown = false;
  msgs.forEach(m=>{
    if (m.ctx && !ctxShown){
      ctxShown=true;
      const s=document.createElement('div'); s.className='sysline';
      s.textContent='— контекст предыдущего обращения —'; feed.appendChild(s);
    }
    const mine = (role==='mod' && m.from==='mod') || (role==='user' && m.from==='user');
    const el=document.createElement('div');
    el.className='msg '+(mine?'mine':'their')+(m.ctx?' ctx':'');
    const who = m.from==='mod' ? (m.by||'Модерация') : (role==='mod' ? (m.by||'Подписчик') : 'Вы');
    el.innerHTML = '<div class="who">'+esc(who)+'</div>'+esc(m.text);
    feed.appendChild(el);
  });
  feed.scrollTop = feed.scrollHeight;
}

async function refresh(){
  if (!sid) return;
  try { render(await api('/api/open', { sid })); }
  catch(e){ /* тихо — не рвём поллинг из-за разовой ошибки */ }
}

async function boot(){
  if (!sid){ fatal('Не передан идентификатор обращения.'); return; }
  try { render(await api('/api/open', { sid })); }
  catch(e){ fatal(e.message); return; }
  pollTimer = setInterval(refresh, 4000);
}

async function doSend(){
  const text = input.value.trim();
  if (!text) return;
  sendBtn.disabled = true;
  try {
    const view = await api('/api/send', { sid, text });
    input.value=''; input.style.height='40px';
    if (view.switchTo){ sid = view.switchTo; }  // ушло как новое обращение с контекстом
    renderedKey='';               // форсируем перерисовку
    render(view);
    if (tg && tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
  } catch(e){
    if (tg) tg.showAlert(e.message); else alert(e.message);
  } finally {
    sendBtn.disabled = input.disabled;
    input.focus();
  }
}

sendBtn.addEventListener('click', doSend);
input.addEventListener('keydown', (e)=>{
  if (e.key==='Enter' && !e.shiftKey){ e.preventDefault(); doSend(); }
});
input.addEventListener('input', ()=>{
  input.style.height='40px'; input.style.height=Math.min(input.scrollHeight,120)+'px';
});

$('reject').addEventListener('click', async ()=>{
  const ok = tg ? await new Promise(r=>tg.showConfirm('Отклонить обращение?',r)) : confirm('Отклонить?');
  if (!ok) return;
  try { await api('/api/reject', { sid }); clearInterval(pollTimer);
        if (tg) tg.close(); else fatal('Обращение отклонено.'); }
  catch(e){ if (tg) tg.showAlert(e.message); else alert(e.message); }
});

boot();
</script>
</body>
</html>

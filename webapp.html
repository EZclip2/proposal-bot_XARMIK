<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Ответ на предложение</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root {
    --bg: #131b24; --panel: #0f161e; --line: #24313d; --muted: #7d8b99;
    --text: #e6edf3; --accent: #6ab3f3; --ok: #6ee787; --danger: #f77e7e;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg); color: var(--text);
    padding: 16px 16px calc(16px + env(safe-area-inset-bottom)); min-height: 100vh;
  }
  .quote { background: var(--panel); border: 1px solid var(--line); border-radius: 12px; padding: 12px 13px; margin-bottom: 16px; }
  .quote .who { font-size: 12.5px; color: var(--accent); margin-bottom: 5px; }
  .quote .num { float: right; font-size: 11px; color: var(--muted); }
  .quote .content { font-size: 14px; color: #d3dde6; line-height: 1.5; white-space: pre-wrap; word-wrap: break-word; }
  .quote .media-note { font-size: 12px; color: var(--muted); margin-top: 6px; }

  .warn { background: rgba(247,192,94,.12); border: 1px solid rgba(247,192,94,.4); color: #f7d08e;
          font-size: 12.5px; padding: 9px 11px; border-radius: 10px; margin-bottom: 14px; display: none; }

  .label { font-size: 12px; color: var(--muted); margin-bottom: 7px; text-transform: uppercase; letter-spacing: .5px; }
  textarea {
    width: 100%; background: var(--panel); border: 1px solid #2a3a48; border-radius: 12px;
    padding: 12px 13px; min-height: 110px; font-size: 15px; color: var(--text);
    line-height: 1.5; resize: vertical; font-family: inherit;
  }
  textarea:focus { outline: none; border-color: var(--accent); }
  .counter { text-align: right; font-size: 11px; color: var(--muted); margin-top: 5px; }

  .quick { display: flex; gap: 7px; flex-wrap: wrap; margin: 14px 0 4px; }
  .tag { font-size: 12.5px; background: #1b2530; border: 1px solid #2a3a48; color: #b9c8d6;
         padding: 7px 12px; border-radius: 20px; cursor: pointer; }
  .tag:active { background: #24313d; }

  .actions { display: flex; gap: 9px; margin-top: 20px; }
  .btn { flex: 1; text-align: center; padding: 14px; border-radius: 12px; font-size: 15px;
         font-weight: 600; border: none; cursor: pointer; color: #fff; }
  .btn.primary { background: linear-gradient(135deg,#3a7bd5,#2b5278); flex: 2; }
  .btn.reject { background: #2a1c1c; color: var(--danger); border: 1px solid #4a2a2a; }
  .btn:disabled { opacity: .5; }
  .hint { text-align: center; font-size: 11.5px; color: var(--muted); margin-top: 14px; }
  .center { text-align: center; color: var(--muted); padding: 40px 0; font-size: 14px; }
</style>
</head>
<body>
  <div id="loading" class="center">Загрузка…</div>

  <div id="app" style="display:none">
    <div class="quote">
      <span class="num" id="q-num"></span>
      <div class="who" id="q-who"></div>
      <div class="content" id="q-content"></div>
      <div class="media-note" id="q-media" style="display:none">📎 К предложению приложено медиа — смотрите карточку в модерации</div>
    </div>

    <div class="warn" id="warn"></div>

    <div class="label">Ваш ответ подписчику</div>
    <textarea id="answer" maxlength="3500" placeholder="Напишите ответ…"></textarea>
    <div class="counter"><span id="cnt">0</span> / 3500</div>

    <div class="quick" id="quick">
      <span class="tag">👍 Спасибо за идею!</span>
      <span class="tag">🕒 Рассмотрим в ближайшее время</span>
      <span class="tag">✅ Уже в планах</span>
    </div>

    <div class="actions">
      <button class="btn reject" id="btn-reject">Отклонить</button>
      <button class="btn primary" id="btn-send">Отправить ответ →</button>
    </div>
    <div class="hint">После отправки окно закроется, а карточка в модерации обновится автоматически</div>
  </div>

<script>
  const tg = window.Telegram.WebApp;
  tg.ready(); tg.expand();

  const sid = tg.initDataUnsafe.start_param;
  const initData = tg.initData;
  const API = window.location.origin;

  const $ = (id) => document.getElementById(id);
  const answer = $('answer'), btnSend = $('btn-send'), btnReject = $('btn-reject');

  async function api(pathName, extra) {
    const res = await fetch(API + pathName, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(Object.assign({ sid, initData }, extra || {})),
    });
    const data = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(data.error || 'Ошибка сервера');
    return data;
  }

  // счётчик
  answer.addEventListener('input', () => { $('cnt').textContent = answer.value.length; });

  // быстрые ответы
  $('quick').addEventListener('click', (e) => {
    if (!e.target.classList.contains('tag')) return;
    answer.value = (answer.value ? answer.value.trim() + ' ' : '') + e.target.textContent;
    answer.dispatchEvent(new Event('input'));
    answer.focus();
  });

  // отправка ответа / дополнения
  btnSend.addEventListener('click', async () => {
    const text = answer.value.trim();
    if (!text) { tg.HapticFeedback.notificationOccurred('error'); answer.focus(); return; }
    const label = btnSend.textContent;
    btnSend.disabled = btnReject.disabled = true;
    btnSend.textContent = 'Отправка…';
    try {
      await api('/api/answer', { text });
      tg.HapticFeedback.notificationOccurred('success');
      tg.close();
    } catch (err) {
      tg.showAlert(err.message);
      btnSend.disabled = btnReject.disabled = false;
      btnSend.textContent = label;
    }
  });

  // отклонение (удаляет карточку + мут пользователю)
  btnReject.addEventListener('click', () => {
    tg.showConfirm('Отклонить и удалить это предложение?', async (ok) => {
      if (!ok) return;
      btnSend.disabled = btnReject.disabled = true;
      try {
        await api('/api/reject');
        tg.HapticFeedback.notificationOccurred('warning');
        tg.close();
      } catch (err) {
        tg.showAlert(err.message);
        btnSend.disabled = btnReject.disabled = false;
      }
    });
  });

  // загрузка предложения + перевод карточки в «Обрабатывается»
  (async () => {
    if (!sid) { $('loading').textContent = 'Не передан номер предложения'; return; }
    try {
      const rec = await api('/api/open');
      $('q-num').textContent = (rec.kind === 'biz' ? '💎 №' : '№') + rec.id;
      $('q-who').textContent = (rec.kind === 'biz' ? '💎 ' : '') + '👤 ' + rec.userMention;
      $('q-content').textContent = rec.bodyText || '(без текста)';
      if (rec.isMedia) $('q-media').style.display = 'block';
      if (rec.state === 'answered') {
        // режим «дополнить ответ» — поле пустое, показываем прошлые ответы как контекст
        $('warn').style.display = 'block';
        $('warn').innerHTML = '✅ Уже отвечено. Ваше сообщение уйдёт подписчику как <b>дополнение</b>.'
          + (rec.answersText ? '<br><br><b>Ранее:</b><br>' + rec.answersText.replace(/</g,'&lt;').replace(/\n/g,'<br>') : '');
        btnSend.textContent = 'Отправить дополнение →';
        answer.placeholder = 'Напишите дополнение…';
      } else if (rec.busy) {
        $('warn').style.display = 'block';
        $('warn').textContent = 'Внимание: с этим предложением уже работает ' + (rec.moderatorName || 'другой модератор') + '.';
      }
      $('loading').style.display = 'none';
      $('app').style.display = 'block';
    } catch (err) {
      $('loading').textContent = err.message;
    }
  })();
</script>
</body>
</html>

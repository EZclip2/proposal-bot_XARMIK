<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Переписка</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root{
    --bg:       var(--tg-theme-bg-color, #0e1621);
    --panel:    var(--tg-theme-secondary-bg-color, #17212b);
    --text:     var(--tg-theme-text-color, #ffffff);
    --hint:     var(--tg-theme-hint-color, #8596a5);
    --link:     var(--tg-theme-link-color, #62a0e0);
    --accent:   var(--tg-theme-button-color, #4d8fd6);
    --accent-t: var(--tg-theme-button-text-color, #ffffff);
    --their:    var(--tg-theme-secondary-bg-color, #1f2a37);
    --danger:   #e15b56;
    --ok:       #4bb34b;
    --warn:     #e0a13a;
    --radius:   19px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
  html,body{height:100%}
  body{
    display:flex;flex-direction:column;height:100vh;overflow:hidden;
    background:var(--bg);color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    font-size:15px;line-height:1.4;
  }

  /* ---------- Header ---------- */
  header{
    flex:0 0 auto;padding:calc(env(safe-area-inset-top) + 10px) 14px 10px;
    background:var(--panel);display:flex;align-items:center;gap:11px;
    box-shadow:0 1px 8px rgba(0,0,0,.28);z-index:5;
  }
  .h-ava{
    flex:0 0 auto;width:42px;height:42px;border-radius:50%;display:grid;place-items:center;
    font-weight:600;font-size:16px;color:#fff;
    background:linear-gradient(135deg,#5a9be6,#3f7bc4);
  }
  .h-ava.mod{background:linear-gradient(135deg,#e0a13a,#d1852a)}
  .h-info{flex:1;min-width:0}
  .h-title{font-weight:600;font-size:16px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .h-sub{display:flex;align-items:center;gap:6px;color:var(--hint);font-size:12.5px;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .chip{display:inline-flex;align-items:center;gap:5px;font-size:12px;padding:2px 8px;border-radius:20px;background:rgba(255,255,255,.07);white-space:nowrap}
  .dot{width:7px;height:7px;border-radius:50%;flex:0 0 auto}
  .dot.new{background:var(--warn)}
  .dot.processing{background:var(--accent);animation:pulse 1.4s infinite}
  .dot.answered{background:var(--ok)}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(77,143,214,.6)}70%{box-shadow:0 0 0 7px rgba(77,143,214,0)}100%{box-shadow:0 0 0 0 rgba(77,143,214,0)}}
  .h-act{flex:0 0 auto;display:flex;gap:8px}
  .icon-btn{
    width:38px;height:38px;border-radius:50%;border:none;cursor:pointer;
    background:rgba(255,255,255,.07);color:var(--text);font-size:17px;display:grid;place-items:center;
    transition:background .15s,transform .1s;
  }
  .icon-btn:active{transform:scale(.9)}
  .icon-btn.danger{color:var(--danger)}

  /* ---------- Feed ---------- */
  #feed{
    flex:1 1 auto;overflow-y:auto;overflow-x:hidden;padding:14px 12px 6px;
    display:flex;flex-direction:column;gap:3px;scroll-behavior:smooth;
    background:
      radial-gradient(circle at 20% 10%, rgba(255,255,255,.02), transparent 40%),
      radial-gradient(circle at 80% 90%, rgba(255,255,255,.02), transparent 40%);
  }
  .row{display:flex;align-items:flex-end;gap:8px;margin-top:8px;animation:pop .22s ease both}
  .row.me{flex-direction:row-reverse}
  @keyframes pop{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .row .ava{
    flex:0 0 auto;width:28px;height:28px;border-radius:50%;display:grid;place-items:center;
    font-size:12px;font-weight:600;color:#fff;background:linear-gradient(135deg,#5a9be6,#3f7bc4);align-self:flex-end;
  }
  .row.me .ava{visibility:hidden;width:0;margin:0}
  .row.modmsg .ava{background:linear-gradient(135deg,#e0a13a,#d1852a)}
  .bubble{
    position:relative;max-width:calc(100% - 52px);padding:8px 12px 6px;border-radius:16px;
    word-break:break-word;overflow-wrap:anywhere;white-space:pre-wrap;
    box-shadow:0 1px 1px rgba(0,0,0,.15);
  }
  .me .bubble{
    background:linear-gradient(135deg,var(--accent),#3f7bc4);color:var(--accent-t);
    border-bottom-right-radius:5px;
  }
  .them .bubble{background:var(--their);border-bottom-left-radius:5px}
  .bubble .who{font-size:12px;font-weight:600;color:var(--link);margin-bottom:2px}
  .me .bubble .who{color:rgba(255,255,255,.85)}
  .bubble .time{font-size:10.5px;opacity:.6;float:right;margin:4px 0 -2px 10px;user-select:none}
  .row.ctx{opacity:.55}
  .row.ctx .bubble{font-style:italic}

  .date-sep{align-self:center;margin:12px 0 4px;font-size:11.5px;color:var(--hint);
    background:rgba(0,0,0,.22);padding:3px 12px;border-radius:20px;backdrop-filter:blur(4px)}
  .sys{align-self:center;margin:8px 4px;font-size:12px;color:var(--hint);text-align:center;max-width:90%}
  .sys.ctx-div{display:flex;align-items:center;gap:10px;width:90%;color:var(--hint)}
  .sys.ctx-div::before,.sys.ctx-div::after{content:"";flex:1;height:1px;background:rgba(255,255,255,.12)}

  /* Пустое состояние / загрузка / ошибка */
  .center-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:var(--hint);padding:30px;text-align:center}
  .center-wrap .emo{font-size:52px;filter:grayscale(.1)}
  .center-wrap b{color:var(--text);font-size:16px}
  .skel{width:100%;max-width:520px;display:flex;flex-direction:column;gap:14px;padding:20px}
  .skel .sk{height:34px;border-radius:14px;background:linear-gradient(90deg,rgba(255,255,255,.05),rgba(255,255,255,.11),rgba(255,255,255,.05));background-size:200% 100%;animation:shimmer 1.3s infinite}
  .skel .sk.r{align-self:flex-end;width:60%}
  .skel .sk.l{align-self:flex-start;width:72%}
  @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

  /* Баннер (locked / read-only) */
  .banner{flex:0 0 auto;padding:9px 14px;text-align:center;font-size:13px;background:rgba(224,161,58,.15);color:var(--warn);border-top:1px solid rgba(224,161,58,.25)}

  /* ---------- Composer ---------- */
  footer{
    flex:0 0 auto;padding:8px 10px calc(env(safe-area-inset-bottom) + 8px);
    background:var(--panel);display:flex;gap:9px;align-items:flex-end;
    box-shadow:0 -1px 8px rgba(0,0,0,.25);
  }
  .input-wrap{flex:1;background:var(--bg);border-radius:22px;display:flex;align-items:flex-end;padding:2px 4px}
  textarea{
    flex:1;resize:none;max-height:130px;min-height:42px;padding:10px 12px;border:none;outline:none;
    background:transparent;color:var(--text);font:inherit;line-height:1.35;
  }
  textarea::placeholder{color:var(--hint)}
  .send-btn{
    flex:0 0 auto;width:46px;height:46px;border-radius:50%;border:none;cursor:pointer;
    background:var(--accent);color:var(--accent-t);font-size:19px;display:grid;place-items:center;
    transition:transform .12s,opacity .15s;
  }
  .send-btn:disabled{opacity:.4;cursor:default}
  .send-btn:not(:disabled):active{transform:scale(.88)}
  .hidden{display:none!important}
</style>
</head>
<body>
  <header id="header" class="hidden">
    <div class="h-ava" id="hAva">💬</div>
    <div class="h-info">
      <div class="h-title" id="hTitle">Переписка</div>
      <div class="h-sub">
        <span class="chip"><span class="dot" id="hDot"></span><span id="hState"></span></span>
        <span id="hMeta"></span>
      </div>
    </div>
    <div class="h-act">
      <button class="icon-btn danger hidden" id="btnReject" title="Отклонить">🚫</button>
    </div>
  </header>

  <div id="feed"></div>

  <div id="banner" class="banner hidden"></div>

  <footer id="composer" class="hidden">
    <div class="input-wrap">
      <textarea id="input" rows="1" placeholder="Сообщение…"></textarea>
    </div>
    <button class="send-btn" id="send" disabled>➤</button>
  </footer>

<script>
const tg = window.Telegram && window.Telegram.WebApp;
if (tg) {
  tg.ready(); tg.expand();
  try {
    tg.setHeaderColor && tg.setHeaderColor('secondary_bg_color');
    tg.setBackgroundColor && tg.setBackgroundColor('bg_color');
  } catch (e) {}
}

let sid = (tg && tg.initDataUnsafe && tg.initDataUnsafe.start_param) || '';
const initData = (tg && tg.initData) || '';
let role = null, lastView = null, renderedKey = '', pollTimer = null, sending = false;

const $ = (id) => document.getElementById(id);
const feed = $('feed'), input = $('input'), sendBtn = $('send');

function api(path, body){
  return fetch(path, {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ initData, ...body })
  }).then(async r => {
    const data = await r.json().catch(()=>({}));
    if (!r.ok) throw new Error(data.error || ('Ошибка ' + r.status));
    return data;
  });
}

function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function initials(name){
  const s = (name||'').replace(/^@/,'').trim();
  return s ? s.slice(0,2).toUpperCase() : '👤';
}
function fmtTime(ms){
  const d = new Date(ms||Date.now());
  return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');
}
function fmtDay(ms){
  const d = new Date(ms||Date.now()), now = new Date();
  const sameDay = (a,b)=>a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate();
  const y = new Date(now); y.setDate(now.getDate()-1);
  if (sameDay(d,now)) return 'Сегодня';
  if (sameDay(d,y))   return 'Вчера';
  return d.toLocaleDateString('ru-RU',{day:'numeric',month:'long'});
}
function stateMeta(st){
  if (st==='new')        return {label:'новое', cls:'new'};
  if (st==='processing') return {label:'в работе', cls:'processing'};
  if (st==='answered')   return {label:'отвечено', cls:'answered'};
  return {label:st||'', cls:''};
}

function screen(kind, opts){
  opts = opts || {};
  clearInterval(pollTimer);
  $('composer').classList.add('hidden');
  $('banner').classList.add('hidden');
  $('header').classList.add('hidden');
  if (kind==='loading'){
    feed.innerHTML = '<div class="skel"><div class="sk l"></div><div class="sk r"></div><div class="sk l"></div><div class="sk r"></div></div>';
  } else if (kind==='error'){
    feed.innerHTML = '<div class="center-wrap"><div class="emo">😕</div><b>Не удалось открыть</b><div>'+esc(opts.msg||'')+'</div></div>';
  }
}

function atBottom(){ return feed.scrollHeight - feed.scrollTop - feed.clientHeight < 80; }

function render(view){
  lastView = view;
  role = view.role;
  const meta = stateMeta(view.state);
  const isMod = role==='mod';

  // header
  $('header').classList.remove('hidden');
  $('hTitle').textContent = isMod ? (view.userMention || 'Подписчик') : 'Ваше обращение';
  $('hAva').textContent = isMod ? initials(view.userMention) : '🛡';
  $('hAva').className = 'h-ava' + (isMod ? '' : ' mod');
  $('hState').textContent = meta.label;
  $('hDot').className = 'dot ' + meta.cls;
  $('hMeta').textContent = '· 🆔 ' + view.id + (view.parentId ? ' · 🔁 '+view.parentId : '');
  $('btnReject').classList.toggle('hidden', !(isMod && !view.locked));

  // composer / banner
  const canWrite = role==='user' || (isMod && !view.locked);
  $('composer').classList.remove('hidden');
  input.disabled = !canWrite;
  input.placeholder = isMod
    ? (view.state==='answered' ? 'Дополнить ответ…' : 'Ваш ответ…')
    : 'Сообщение…';
  syncSendBtn();

  if (view.locked){
    $('banner').classList.remove('hidden');
    $('banner').textContent = '🔒 Это обращение уже ведёт ' + (view.moderatorName || 'другой модератор');
    $('composer').classList.add('hidden');
  } else {
    $('banner').classList.add('hidden');
  }

  // feed — перерисовываем только при изменениях
  const key = view.id+'|'+view.state+'|'+view.messages.length+'|'+(view.messages.slice(-1)[0]?.time||0)+'|'+view.locked;
  if (key === renderedKey) return;
  const stick = atBottom() || renderedKey==='';
  renderedKey = key;

  feed.innerHTML = '';
  const msgs = view.messages || [];
  if (!msgs.length){
    feed.innerHTML = '<div class="center-wrap"><div class="emo">✍️</div><b>'
      + (isMod ? 'Обращение без текста' : 'Начните переписку')
      + '</b><div>'+(isMod?'Напишите первый ответ подписчику.':'Опишите вопрос — модерация ответит здесь.')+'</div></div>';
    return;
  }

  let lastDay = '', ctxShown = false;
  msgs.forEach(m=>{
    // разделитель контекста
    if (m.ctx && !ctxShown){
      ctxShown = true;
      const s=document.createElement('div'); s.className='sys ctx-div';
      s.textContent='контекст прошлого обращения'; feed.appendChild(s);
    }
    // разделитель дат
    const day = fmtDay(m.time);
    if (day !== lastDay){
      lastDay = day;
      const ds=document.createElement('div'); ds.className='date-sep'; ds.textContent=day; feed.appendChild(ds);
    }

    const mine = (isMod && m.from==='mod') || (role==='user' && m.from==='user');
    const row=document.createElement('div');
    row.className='row '+(mine?'me':'them')+(m.from==='mod'?' modmsg':'')+(m.ctx?' ctx':'');

    const ava=document.createElement('div');
    ava.className='ava';
    ava.textContent = m.from==='mod' ? initials(m.by||'М') : initials(m.by||view.userMention);
    row.appendChild(ava);

    const b=document.createElement('div'); b.className='bubble';
    const showWho = !mine; // подпись у чужих
    const who = m.from==='mod' ? (m.by||'Модерация') : (isMod ? (m.by||'Подписчик') : 'Вы');
    b.innerHTML =
      (showWho ? '<div class="who">'+esc(who)+'</div>' : '') +
      esc(m.text) +
      '<span class="time">'+fmtTime(m.time)+'</span>';
    row.appendChild(b);
    feed.appendChild(row);
  });

  if (stick) feed.scrollTop = feed.scrollHeight;
}

function syncSendBtn(){
  sendBtn.disabled = sending || input.disabled || !input.value.trim();
}

async function refresh(){
  if (!sid) return;
  try { render(await api('/api/open', { sid })); }
  catch(e){ /* тихо: разовые ошибки поллинга не рвут сессию */ }
}

async function boot(){
  screen('loading');
  if (!sid){ screen('error', {msg:'Не передан идентификатор обращения.'}); return; }
  try { render(await api('/api/open', { sid })); }
  catch(e){ screen('error', {msg:e.message}); return; }
  clearInterval(pollTimer);
  pollTimer = setInterval(refresh, 3500);
}

async function doSend(){
  const text = input.value.trim();
  if (!text || sending) return;
  sending = true; syncSendBtn();
  try {
    const view = await api('/api/send', { sid, text });
    input.value=''; autoGrow();
    if (view.switchTo && view.switchTo !== sid){
      sid = view.switchTo;
      renderedKey='';
      if (tg && tg.showPopup){ /* без модалки, тихо */ }
    }
    renderedKey='';
    render(view);
    feed.scrollTop = feed.scrollHeight;
    if (tg && tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
  } catch(e){
    if (tg && tg.showAlert) tg.showAlert(e.message); else alert(e.message);
  } finally {
    sending = false; syncSendBtn(); input.focus();
  }
}

function autoGrow(){
  input.style.height='42px';
  input.style.height=Math.min(input.scrollHeight,130)+'px';
}

sendBtn.addEventListener('click', doSend);
input.addEventListener('input', ()=>{ autoGrow(); syncSendBtn(); });
input.addEventListener('keydown', (e)=>{
  if (e.key==='Enter' && !e.shiftKey){ e.preventDefault(); doSend(); }
});

$('btnReject').addEventListener('click', async ()=>{
  const ask = (cb)=> (tg && tg.showConfirm) ? tg.showConfirm('Отклонить обращение? Действие необратимо.', cb) : cb(confirm('Отклонить обращение?'));
  ask(async (ok)=>{
    if (!ok) return;
    try {
      await api('/api/reject', { sid });
      clearInterval(pollTimer);
      if (tg && tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('warning');
      if (tg && tg.close) tg.close();
      else { screen('error',{msg:'Обращение отклонено.'}); feed.innerHTML='<div class="center-wrap"><div class="emo">🚫</div><b>Отклонено</b></div>'; }
    } catch(e){ if (tg&&tg.showAlert) tg.showAlert(e.message); else alert(e.message); }
  });
});

boot();
</script>
</body>
</html>
